<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Books — Library System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav>
  <h2>📚 Library System</h2>
  <div>
    <a href="/">Home</a>
    <a href="/books">Books</a>
    <a href="/issue">Issue/Return</a>
    <a href="/admin">Admin</a>
    <a href="/student">My Books</a>
  </div>
</nav>

<div class="container">

  <!-- Add Book -->
  <div class="box">
    <h2>➕ Add Book (Admin)</h2>
    <div class="row">
      <div>
        <label>Title *</label>
        <input id="book-title" placeholder="Book title">
      </div>
      <div>
        <label>Author *</label>
        <input id="book-author" placeholder="Author name">
      </div>
      <div>
        <label>Genre</label>
        <input id="book-genre" placeholder="e.g. Fiction">
      </div>
      <div>
        <label>Copies</label>
        <input id="book-copies" type="number" value="1" min="1" style="width:70px">
      </div>
    </div>
    <button class="btn-blue" onclick="addBook()">Add Book</button>
  </div>

  <!-- Search -->
  <div class="box">
    <h2>🔍 Search Books</h2>
    <div class="row">
      <div>
        <label>Title / Author</label>
        <input id="search-q" placeholder="Search..." oninput="loadBooks()">
      </div>
      <div>
        <label>Genre</label>
        <select id="filter-genre" onchange="loadBooks()">
          <option value="">All Genres</option>
        </select>
      </div>
      <div style="display:flex;align-items:flex-end">
        <button class="btn-gray" onclick="document.getElementById('search-q').value='';document.getElementById('filter-genre').value='';loadBooks();">Clear</button>
      </div>
    </div>
  </div>

  <!-- Books Table -->
  <div class="box">
    <h2>📚 All Books</h2>
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Genre</th>
          <th>Copies</th>
          <th>Available</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="books-tbody">
        <tr><td colspan="6"><div class="empty">Loading...</div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<div id="toast"></div>
<script src="/js/script.js"></script>
<script>loadGenreFilter(); loadBooks();</script>
</body>
</html>
