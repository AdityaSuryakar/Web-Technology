<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Issue / Return — Library System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav>
  <h2>📚 Library System</h2>
  <div>
    <a href="/">Home</a>
    <a href="/books">Books</a>
    <a href="/issue">Issue/Return</a>
    <a href="/admin">Admin</a>
    <a href="/student">My Books</a>
  </div>
</nav>

<div class="container">

  <!-- Issue a Book -->
  <div class="box">
    <h2>📤 Issue a Book</h2>
    <div class="note">Loan period: <strong>14 days</strong>. Fine: <strong>₹2/day</strong> after due date.</div>
    <div class="row">
      <div>
        <label>Book (available only)</label>
        <select id="issue-book"><option value="">Select Book</option></select>
      </div>
      <div>
        <label>Student</label>
        <select id="issue-student"><option value="">Select Student</option></select>
      </div>
    </div>
    <button class="btn-blue" onclick="issueBook()">Issue Book</button>
  </div>

  <!-- Active Issues -->
  <div class="box">
    <h2>📋 Active Issues</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Book</th>
          <th>Student</th>
          <th>Issue Date</th>
          <th>Due Date</th>
          <th>Fine</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="issues-tbody">
        <tr><td colspan="7"><div class="empty">Loading...</div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<div id="toast"></div>
<script src="/js/script.js"></script>
<script>populateSelects(); loadIssues();</script>
</body>
</html>
