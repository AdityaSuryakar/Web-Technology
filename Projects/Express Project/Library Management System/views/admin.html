<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin — Library System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav>
  <h2>📚 Library System</h2>
  <div>
    <a href="/">Home</a>
    <a href="/books">Books</a>
    <a href="/issue">Issue/Return</a>
    <a href="/admin">Admin</a>
    <a href="/student">My Books</a>
  </div>
</nav>

<div class="container">

  <!-- Add Student -->
  <div class="box">
    <h2>🎓 Register Student</h2>
    <div class="row">
      <div>
        <label>Name *</label>
        <input id="stu-name" placeholder="Full name">
      </div>
      <div>
        <label>Roll Number *</label>
        <input id="stu-roll" placeholder="e.g. CS2021004">
      </div>
      <div>
        <label>Email</label>
        <input id="stu-email" type="email" placeholder="email@college.edu">
      </div>
    </div>
    <button class="btn-blue" onclick="addStudent()">Register</button>
  </div>

  <!-- Students Table -->
  <div class="box">
    <h2>👥 Students</h2>
    <table>
      <thead>
        <tr><th>ID</th><th>Name</th><th>Roll No.</th><th>Email</th></tr>
      </thead>
      <tbody id="students-tbody">
        <tr><td colspan="4"><div class="empty">Loading...</div></td></tr>
      </tbody>
    </table>
  </div>

  <!-- All Issue Records -->
  <div class="box">
    <h2>📋 All Issue Records</h2>
    <p style="font-size:0.82rem;color:#e74c3c;margin-bottom:10px;">⚠️ Rows in red = overdue</p>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Book</th>
          <th>Student</th>
          <th>Issue Date</th>
          <th>Due Date</th>
          <th>Return Date</th>
          <th>Fine</th>
        </tr>
      </thead>
      <tbody id="admin-issues-tbody">
        <tr><td colspan="7"><div class="empty">Loading...</div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<div id="toast"></div>
<script src="/js/script.js"></script>
<script>loadStudentsTable(); loadAllIssues();</script>
</body>
</html>
